---
- name: "Bootstrap VM: Docker (Rootless), Hawser, and Portainer Agent"
  hosts: target_node
  gather_facts: true
  
  vars:
    # --- Default Toggles (Semaphore Extra Vars will override these) ---
    setup_docker: true
    setup_traefik: true
    setup_hawser: true
    setup_portainer_agent: true
    secure_vm: true
    install_utilities: true
    ssh_ip: "0.0.0.0/0"

  tasks:
    # ── 1. System Preparation ──────────────────────────────────────────────
    - name: "Update apt cache and install base utilities"
      ansible.builtin.apt:
        name: [ufw, curl, wget, iptables, software-properties-common, python3-pip]
        update_cache: yes
        state: present
      when: install_utilities
      become: true

    # ── 2. Docker Engine & Permissions ─────────────────────────────────────
    - name: "Install Docker via official script"
      ansible.builtin.shell: 
        cmd: "curl -fsSL https://get.docker.com | sh"
        creates: /usr/bin/docker
      when: setup_docker
      become: true

    - name: "Ensure {{ ansible_user }} is in the docker group"
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes
      when: setup_docker
      become: true

    - name: "Configure Docker log rotation"
      ansible.builtin.copy:
        dest: /etc/docker/daemon.json
        mode: '0644'
        content: |
          {
            "log-driver": "json-file",
            "log-opts": { "max-size": "10m", "max-file": "3" }
          }
      register: docker_cfg
      when: setup_docker
      become: true

    - name: "Restart Docker and reset connection"
      block:
        - ansible.builtin.systemd:
            name: docker
            state: restarted
            enabled: yes
        - ansible.builtin.meta: reset_connection
      when: setup_docker and docker_cfg.changed
      become: true

    # ── 3. Security Block (Conditional) ──────────────────────────────────
    - name: "Apply Firewall and SSH Security"
      when: secure_vm
      become: true
      block:
        - name: "Download ufw-docker utility"
          ansible.builtin.get_url:
            url: https://raw.githubusercontent.com/chaifeng/ufw-docker/master/ufw-docker
            dest: /usr/local/bin/ufw-docker
            mode: '0755'

        - name: "Install ufw-docker configuration"
          ansible.builtin.command: /usr/local/bin/ufw-docker install
          register: ufw_dock_out
          changed_when: "'already installed' not in ufw_dock_out.stdout"

        - name: "Set UFW default policies"
          community.general.ufw:
            state: enabled
            policy: deny
            direction: "{{ item }}"
          loop: [incoming, routed]

        - name: "Allow SSH from Admin IP only"
          community.general.ufw:
            rule: allow
            port: '22'
            proto: tcp
            from_ip: "{{ ssh_ip }}"
            comment: "Management SSH"

        - name: "Allow Admin IP to access services"
          ansible.builtin.command: "ufw route allow proto tcp from {{ ssh_ip }} to any port {{ item }}"
          loop: [80, 443, 8081, 2376, 9001]
          changed_when: false

    # ── 4. Application Deployment ─────────────────────────────────────────
    - name: "Deploy Service Stack"
      become: true
      block:
        # Traefik
        - name: "Create Traefik directory and config"
          block:
            - ansible.builtin.file: { path: "/opt/traefik", state: directory, mode: '0755' }
            - ansible.builtin.copy:
                dest: /opt/traefik/traefik.yml
                mode: '0644'
                content: |
                  api: { dashboard: true, insecure: true }
                  providers: { docker: { exposedByDefault: false } }
                  entryPoints:
                    web: { address: ":80" }
                    websecure: { address: ":443" }
          when: setup_traefik

        - name: "Launch Traefik container"
          community.docker.docker_container:
            name: traefik
            image: traefik:latest
            restart_policy: unless-stopped
            published_ports: ["80:80", "443:443", "8081:8080"]
            volumes:
              - /var/run/docker.sock:/var/run/docker.sock
              - /opt/traefik/traefik.yml:/etc/traefik/traefik.yml
          when: setup_traefik

        # Hawser
        - name: "Launch Hawser container"
          community.docker.docker_container:
            name: hawser
            image: ghcr.io/finsys/hawser:latest
            restart_policy: unless-stopped
            published_ports: ["2376:2376"]
            volumes: ["/var/run/docker.sock:/var/run/docker.sock"]
          when: setup_hawser

        # Portainer Agent
        - name: "Launch Portainer Agent"
          community.docker.docker_container:
            name: portainer_agent
            image: portainer/agent:2.40.0
            restart_policy: always
            published_ports: ["9001:9001"]
            volumes:
              - /var/run/docker.sock:/var/run/docker.sock
              - /var/lib/docker/volumes:/var/lib/docker/volumes
              - /:/host
          when: setup_portainer_agent

    - name: "Summary Output"
      ansible.builtin.debug:
        msg:
          - "Setup Complete!"
          - "Portainer Agent: http://{{ ansible_host }}:9001"
          - "Hawser: tcp://{{ ansible_host }}:2376"
          - "Traefik Dashboard: http://{{ ansible_host }}:8081"
