# =======================================================================
# PHASE 1: INFRASTRUCTURE PROVISIONING (PROXMOX API)
# =======================================================================
- name: "Infrastructure Provisioning"
  hosts: proxmox
  gather_facts: false
  vars:
    pve_api:          "https://{{ ansible_host }}:8006/api2/json"
    pve_token:        "PVEAPIToken={{ proxmox_token_id }}={{ proxmox_token_secret }}"
    proxmox_node:     "pve"
    node_count:       3
    template_id:      103
    vm_prefix:        "k3s-node"
    vm_cpu:           4
    vm_ram:           8192
    vm_disk:          "30G"
    domain:           "astro.lan"

  tasks:

    - name: "1. Get next available VMID"
      ansible.builtin.uri:
        url: "{{ pve_api }}/cluster/nextid"
        method: GET
        headers:
          Authorization: "{{ pve_token }}"
        validate_certs: false
      register: next_vmid_api
      delegate_to: localhost

    - name: "2. Set starting VMID fact"
      ansible.builtin.set_fact:
        start_id: "{{ next_vmid_api.json.data | int }}"

    - name: "3. Clone template {{ template_id }} → VMIDs {{ start_id }}..{{ start_id | int + node_count | int - 1 }}"
      community.general.proxmox_kvm:
        api_host:         "{{ ansible_host }}"
        api_user:         "{{ proxmox_token_id.split('!')[0] }}"
        api_token_id:     "{{ proxmox_token_id.split('!')[1] }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node:             "{{ proxmox_node }}"
        vmid:             "{{ template_id }}"
        clone:            "{{ template_id }}"
        newid:            "{{ start_id | int + item }}"
        name:             "{{ vm_prefix }}-{{ item }}-{{ start_id | int + item }}"
        full:             true
        agent:            1
        state:            present
        timeout:          600
      loop: "{{ range(0, node_count | int) | list }}"
      loop_control:
        pause: 5
      delegate_to: localhost

    - name: "3b. Wait for cloned VM configs to be ready"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ start_id | int + item }}/config"
        method: GET
        headers:
          Authorization: "{{ pve_token }}"
        validate_certs: false
        status_code: 200
      register: vm_config_check
      until: vm_config_check.status == 200
      retries: 20
      delay: 5
      loop: "{{ range(0, node_count | int) | list }}"
      delegate_to: localhost

    - name: "4. Resize disk to {{ vm_disk }}"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ start_id | int + item }}/resize"
        method: PUT
        headers:
          Authorization: "{{ pve_token }}"
        body_format: json
        body:
          disk: "scsi0"
          size: "{{ vm_disk }}"
        validate_certs: false
      loop: "{{ range(0, node_count | int) | list }}"
      delegate_to: localhost

    - name: "5. Set cloud-init — user / password / DHCP"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ start_id | int + item }}/config"
        method: PUT
        headers:
          Authorization: "{{ pve_token }}"
        body_format: form-urlencoded
        body:
          ciuser:     "{{ vm_user }}"
          cipassword: "{{ vm_password }}"
          ipconfig0:  "ip=dhcp"
        validate_certs: false
        status_code: 200
      loop: "{{ range(0, node_count | int) | list }}"
      delegate_to: localhost

    - name: "6. Start VMs"
      community.general.proxmox_kvm:
        api_host:         "{{ ansible_host }}"
        api_user:         "{{ proxmox_token_id.split('!')[0] }}"
        api_token_id:     "{{ proxmox_token_id.split('!')[1] }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node:             "{{ proxmox_node }}"
        vmid:             "{{ start_id | int + item }}"
        state:            started
      loop: "{{ range(0, node_count | int) | list }}"
      delegate_to: localhost

    - name: "6b. Wait for cloud-init to finish via QEMU agent"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ start_id | int + item }}/agent/exec"
        method: POST
        headers:
          Authorization: "{{ pve_token }}"
        body_format: json
        body:
          command:
            - "bash"
            - "-c"
            - "cloud-init status | grep -q 'done' && echo OK || exit 1"
        validate_certs: false
        status_code: [200, 500]
      register: ci_wait
      until: ci_wait.status == 200
      retries: 60
      delay: 10
      loop: "{{ range(0, node_count | int) | list }}"
      delegate_to: localhost

    - name: "7. Bootstrap user + enable SSH password auth via QEMU agent"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ start_id | int + item }}/agent/exec"
        method: POST
        headers:
          Authorization: "{{ pve_token }}"
        body_format: json
        body:
          command:
            - "bash"
            - "-c"
            - |
              id {{ vm_user }} &>/dev/null || useradd -m -s /bin/bash {{ vm_user }}
              echo "{{ vm_user }}:{{ vm_password }}" | chpasswd
              echo '{{ vm_user }} ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/{{ vm_user }}
              chmod 440 /etc/sudoers.d/{{ vm_user }}
              sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
              sed -i 's/^#*KbdInteractiveAuthentication.*/KbdInteractiveAuthentication yes/' /etc/ssh/sshd_config
              systemctl restart ssh || systemctl restart sshd
              reboot
        validate_certs: false
      register: agent_exec
      until: agent_exec.status == 200
      retries: 50
      delay: 5
      loop: "{{ range(0, node_count | int) | list }}"
      delegate_to: localhost

    - name: "8. Wait for reboot to complete"
      ansible.builtin.pause:
        seconds: 60

    - name: "9. Discover VM IPs via QEMU guest agent"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ start_id | int + item }}/agent/network-get-interfaces"
        method: GET
        headers:
          Authorization: "{{ pve_token }}"
        validate_certs: false
      register: vm_interfaces_api
      until: >
        vm_interfaces_api.json.data.result
        | selectattr('name', 'ne', 'lo')
        | map(attribute='ip-addresses')
        | flatten
        | selectattr('ip-address-type', 'eq', 'ipv4')
        | list | length > 0
      retries: 50
      delay: 5
      loop: "{{ range(0, node_count | int) | list }}"
      delegate_to: localhost

    - name: "10. Add VMs to in-memory inventory"
      ansible.builtin.add_host:
        name:                   "{{ vm_prefix }}-{{ idx }}-{{ start_id | int + item.item }}"
        ansible_host:           >-
          {{
            item.json.data.result
            | selectattr('name', 'ne', 'lo')
            | map(attribute='ip-addresses')
            | flatten
            | selectattr('ip-address-type', 'eq', 'ipv4')
            | map(attribute='ip-address')
            | first
          }}
        groups:                 "{{ ['k3s_nodes', 'k3s_master' if idx == 0 else 'k3s_workers'] }}"
        ansible_user:           "{{ vm_user }}"
        ansible_password:       "{{ vm_password }}"
        ansible_become:         true
        ansible_become_method:  sudo
        ansible_become_pass:    "{{ vm_password }}"
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        cluster_id_tag:         "{{ start_id }}"
        domain_name:            "{{ domain }}"
      loop: "{{ vm_interfaces_api.results }}"
      loop_control:
        index_var: idx
      delegate_to: localhost

    - name: "11. Print discovered IPs"
      ansible.builtin.debug:
        msg: "{{ vm_prefix }}-{{ idx }}-{{ start_id | int + item.item }} → {{ item.json.data.result | selectattr('name', 'ne', 'lo') | map(attribute='ip-addresses') | flatten | selectattr('ip-address-type', 'eq', 'ipv4') | map(attribute='ip-address') | first }}"
      loop: "{{ vm_interfaces_api.results }}"
      loop_control:
        index_var: idx

# =======================================================================
# PHASE 2: K3S & SOFTWARE STACK
# =======================================================================
- name: "K3s Cluster & Software Stack"
  hosts: k3s_nodes
  gather_facts: false
  become: true
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
    kube_env: { KUBECONFIG: "/etc/rancher/k3s/k3s.yaml" }

  tasks:

    - name: "12. Wait for SSH"
      ansible.builtin.wait_for_connection:
        timeout: 180

    - name: "13. Gather facts"
      ansible.builtin.setup:

    - name: "14. Expand disk — detect & grow all partitions and filesystems"
      ansible.builtin.shell: |
        set -e
        ROOT_DISK=$(lsblk -ndo PKNAME $(findmnt -n -o SOURCE /) 2>/dev/null || echo "")
        if [ -z "$ROOT_DISK" ]; then
          if [ -b /dev/vda ]; then ROOT_DISK="vda"
          elif [ -b /dev/sda ]; then ROOT_DISK="sda"
          else echo "ERROR: cannot detect root disk" && exit 1
          fi
        fi
        growpart /dev/$ROOT_DISK 3 || true
        pvresize /dev/${ROOT_DISK}3 || true
        LV_PATH=$(lvdisplay | awk '/LV Path/{print $3}' | head -1)
        if [ -n "$LV_PATH" ]; then
          lvextend -l +100%FREE "$LV_PATH" || true
          resize2fs "$LV_PATH" 2>/dev/null || xfs_growfs "$LV_PATH" 2>/dev/null || true
        fi
        df -h /
      changed_when: false

    - name: "15. Install K3s master"
      ansible.builtin.shell: "curl -sfL https://get.k3s.io | sh -s - server --disable traefik"
      when: "'k3s_master' in group_names"
      args:
        creates: /etc/rancher/k3s/k3s.yaml

    - name: "16. Fix kubeconfig permissions"
      ansible.builtin.shell: |
        chmod 644 /etc/rancher/k3s/k3s.yaml
        grep -q "KUBECONFIG" /home/{{ ansible_user }}/.bashrc || \
          echo "export KUBECONFIG=/etc/rancher/k3s/k3s.yaml" >> /home/{{ ansible_user }}/.bashrc
      when: "'k3s_master' in group_names"

    - name: "17. Join worker nodes"
      vars:
        master_ip: "{{ hostvars[groups['k3s_master'][0]].ansible_host }}"
      block:
        - name: "Get token"
          ansible.builtin.shell: "cat /var/lib/rancher/k3s/server/node-token"
          register: k3s_token
          delegate_to: "{{ groups['k3s_master'][0] }}"

        - name: "Install & join"
          ansible.builtin.shell: >
            curl -sfL https://get.k3s.io |
            K3S_URL='https://{{ master_ip }}:6443'
            K3S_TOKEN='{{ k3s_token.stdout }}'
            sh -
          when: "'k3s_workers' in group_names"

    - name: "18. Install Helm & system dependencies"
      ansible.builtin.shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        apt-get update && apt-get install -y open-iscsi nfs-common jq
      when: "'k3s_master' in group_names"

    - name: "19. Add Helm repos"
      ansible.builtin.shell: |
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
        helm repo add jetstack https://charts.jetstack.io
        helm repo add rancher-latest https://releases.rancher.com/server-charts/latest
        helm repo update
      environment: "{{ kube_env }}"
      when: "'k3s_master' in group_names"

    - name: "20. Install ingress-nginx"
      ansible.builtin.shell: |
        helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
          --namespace ingress-nginx --create-namespace
      environment: "{{ kube_env }}"
      when: "'k3s_master' in group_names"

    - name: "21. Wait for ingress-nginx controller & admission webhook"
      ansible.builtin.shell: |
        kubectl rollout status deployment/ingress-nginx-controller \
          -n ingress-nginx --timeout=300s
        kubectl wait --namespace ingress-nginx \
          --for=condition=ready pod \
          --selector=app.kubernetes.io/component=controller \
          --timeout=300s
      environment: "{{ kube_env }}"
      when: "'k3s_master' in group_names"

    - name: "22. Install cert-manager"
      ansible.builtin.shell: |
        helm upgrade --install cert-manager jetstack/cert-manager \
          --namespace cert-manager --create-namespace \
          --set installCRDs=true
      environment: "{{ kube_env }}"
      when: "'k3s_master' in group_names"

    - name: "23. Set unique Rancher hostname fact"
      ansible.builtin.set_fact:
        rancher_hostname: "rancher-{{ cluster_id_tag }}.{{ domain_name }}"
      when: "'k3s_master' in group_names"

    - name: "24. Deploy Rancher (NodePort 30443)"
      ansible.builtin.shell: |
        helm upgrade --install rancher rancher-latest/rancher \
          -n cattle-system --create-namespace \
          --set hostname={{ rancher_hostname }} \
          --set bootstrapPassword=admin \
          --set replicas=1 \
          --set ingress.ingressClassName=nginx \
          --set service.type=NodePort \
          --set service.nodePort=30443
      environment: "{{ kube_env }}"
      when: "'k3s_master' in group_names"

    - name: "25. Final access summary"
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "         CLUSTER DEPLOYMENT COMPLETE        "
          - "============================================"
          - "Master IP    : {{ ansible_host }}"
          - "Cluster ID   : {{ cluster_id_tag }}"
          - "--------------------------------------------"
          - "Rancher URL  : https://{{ ansible_host }}:30443"
          - "Rancher Host : {{ rancher_hostname }}"
          - "============================================"
      when: "'k3s_master' in group_names"
