# ══════════════════════════════════════════════════════════════════════════════
# PLAY 1 — Proxmox Provisioning
# ══════════════════════════════════════════════════════════════════════════════
- name: "Provision VM from Proxmox template"
  hosts: proxmox
  gather_facts: false
  vars:
    pve_api: "https://{{ ansible_host }}:8006/api2/json"
    pve_token: "PVEAPIToken={{ proxmox_token_id }}={{ proxmox_token_secret }}"
    proxmox_node: "pve3"
    template_id: 103
    # ── Hardware defaults (override via variable group) ──────────────────────
    vm_memory:    2048   # RAM in MB
    vm_cores:     2      # vCPU cores
    vm_disk_size: "20G"  # Disk size — must be LARGER than template disk

  tasks:
    - name: "1. Get next available VMID"
      ansible.builtin.uri:
        url: "{{ pve_api }}/cluster/nextid"
        method: GET
        headers: { Authorization: "{{ pve_token }}" }
        validate_certs: false
      register: next_vmid_api
      delegate_to: localhost

    - name: "2. Clone template to VMID {{ next_vmid_api.json.data }}"
      community.general.proxmox_kvm:
        api_host:         "{{ ansible_host }}"
        api_user:         "{{ proxmox_token_id.split('!')[0] }}"
        api_token_id:     "{{ proxmox_token_id.split('!')[1] }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node:             "{{ proxmox_node }}"
        vmid:             "{{ template_id }}"
        clone:            "{{ template_id }}"
        newid:            "{{ next_vmid_api.json.data }}"
        name:             "{{ new_vm_name }}-{{ next_vmid_api.json.data }}"
        full:             true
        agent:            1
        state:            present
        timeout:          600
      delegate_to: localhost

    - name: "3. Apply Hardware Config (RAM / CPU)"
      community.general.proxmox_kvm:
        api_host:         "{{ ansible_host }}"
        api_user:         "{{ proxmox_token_id.split('!')[0] }}"
        api_token_id:     "{{ proxmox_token_id.split('!')[1] }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node:             "{{ proxmox_node }}"
        vmid:             "{{ next_vmid_api.json.data }}"
        memory:           "{{ vm_memory }}"
        cores:            "{{ vm_cores }}"
        update:           true
      delegate_to: localhost

    - name: "4. Resize Disk to {{ vm_disk_size }}"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ next_vmid_api.json.data }}/resize"
        method: PUT
        headers: { Authorization: "{{ pve_token }}" }
        body_format: form-urlencoded
        body:
          disk: "scsi0"
          size: "{{ vm_disk_size }}"
        validate_certs: false
        status_code: [200, 422]   # 422 = already at target size, safe to ignore
      register: resize_result
      changed_when: resize_result.status == 200
      delegate_to: localhost

    - name: "5. Configure Cloud-Init (DHCP)"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ next_vmid_api.json.data }}/config"
        method: PUT
        headers: { Authorization: "{{ pve_token }}" }
        body_format: form-urlencoded
        body:
          ciuser:     "{{ vm_user }}"
          cipassword: "{{ vm_password }}"
          ipconfig0:  "ip=dhcp"
        validate_certs: false
      delegate_to: localhost

    - name: "6. Start the VM"
      community.general.proxmox_kvm:
        api_host:         "{{ ansible_host }}"
        api_user:         "{{ proxmox_token_id.split('!')[0] }}"
        api_token_id:     "{{ proxmox_token_id.split('!')[1] }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node:             "{{ proxmox_node }}"
        vmid:             "{{ next_vmid_api.json.data }}"
        state:            started
      delegate_to: localhost

    - name: "7. Wait for cloud-init via Agent"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ next_vmid_api.json.data }}/agent/exec"
        method: POST
        headers: { Authorization: "{{ pve_token }}" }
        body_format: json
        body:
          command: ["bash", "-c", "cloud-init status | grep -q 'done' && echo OK || exit 1"]
        validate_certs: false
        status_code: [200, 500]
      register: ci_wait
      until: ci_wait.status == 200
      retries: 60
      delay: 10
      delegate_to: localhost

    - name: "8. Agent-Config: Setup User, Sudoers, SSH and Reboot"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ next_vmid_api.json.data }}/agent/exec"
        method: POST
        headers: { Authorization: "{{ pve_token }}" }
        body_format: json
        body:
          command:
            - "bash"
            - "-c"
            - |
              id {{ vm_user }} &>/dev/null || useradd -m -s /bin/bash {{ vm_user }}
              echo "{{ vm_user }}:{{ vm_password }}" | chpasswd
              echo '{{ vm_user }} ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/{{ vm_user }}
              sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
              systemctl restart ssh || systemctl restart sshd
              reboot
        validate_certs: false
      delegate_to: localhost

    - name: "9. Wait for reboot"
      ansible.builtin.pause:
        seconds: 60

    - name: "10. Discover IP via Guest Agent"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ next_vmid_api.json.data }}/agent/network-get-interfaces"
        method: GET
        headers: { Authorization: "{{ pve_token }}" }
        validate_certs: false
      register: vm_interfaces_api
      until:
        - vm_interfaces_api.json.data is not none
        - "'result' in vm_interfaces_api.json.data"
        - "vm_interfaces_api.json.data.result | selectattr('name', 'ne', 'lo') | list | length > 0"
      retries: 50
      delay: 5
      delegate_to: localhost

    - name: "11. Add host to inventory"
      ansible.builtin.add_host:
        name: "new_vm"
        ansible_host: "{{ vm_interfaces_api.json.data.result | selectattr('name', 'ne', 'lo') | map(attribute='ip-addresses') | flatten | selectattr('ip-address-type', 'eq', 'ipv4') | map(attribute='ip-address') | first }}"
        ansible_user: "{{ vm_user }}"
        ansible_password: "{{ vm_password }}"
        ansible_become: true
        ansible_become_pass: "{{ vm_password }}"
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"


# ══════════════════════════════════════════════════════════════════════════════
# PLAY 2 — Bootstrap New VM
# ══════════════════════════════════════════════════════════════════════════════
- name: "Bootstrap New VM"
  hosts: new_vm
  gather_facts: true

  tasks:

    # ── Utilities ─────────────────────────────────────────────────────────────
    - name: "Install base utilities"
      when: install_utilities | bool
      ansible.builtin.apt:
        name: [ufw, curl, wget, iptables]
        update_cache: yes

    # ── Docker ────────────────────────────────────────────────────────────────
    - name: "Docker: Engine and Log Rotation"
      when: setup_docker | bool
      block:
        - name: "Install Docker"
          ansible.builtin.shell: "curl -fsSL https://get.docker.com | sh"
          args: { creates: /usr/bin/docker }

        - name: "Add user to docker group"
          ansible.builtin.user:
            name: "{{ ansible_user }}"
            groups: docker
            append: yes

        - name: "Config log rotation"
          ansible.builtin.copy:
            dest: /etc/docker/daemon.json
            content: '{"log-driver":"json-file","log-opts":{"max-size":"10m","max-file":"3"}}'
          register: d_cfg

        - name: "Restart Docker"
          ansible.builtin.systemd:
            name: docker
            state: restarted
            enabled: yes
          when: d_cfg.changed

    # ── UFW / Security ────────────────────────────────────────────────────────
    - name: "Security: UFW & ufw-docker integration"
      when: secure_vm | bool
      block:
        - name: "Enable UFW with default deny incoming"
          community.general.ufw:
            state: enabled
            policy: deny
            direction: incoming

        - name: "Allow SSH from admin IP only"
          community.general.ufw:
            rule: allow
            port: '22'
            proto: tcp
            from_ip: "{{ ssh_ip }}"

        - name: "Install ufw-docker"
          ansible.builtin.get_url:
            url: https://raw.githubusercontent.com/chaifeng/ufw-docker/master/ufw-docker
            dest: /usr/local/bin/ufw-docker
            mode: '0755'

        - name: "Run ufw-docker install"
          ansible.builtin.command: /usr/local/bin/ufw-docker install
          changed_when: false

        - name: "Allow route rules from admin IP"
          ansible.builtin.command: "ufw route allow proto tcp from {{ ssh_ip }} to any port {{ item }}"
          loop: [80, 443, 8081, 2376, 9001]
          changed_when: false

    # ── Traefik ───────────────────────────────────────────────────────────────
    - name: "Deploy Traefik"
      when: setup_traefik | bool
      community.docker.docker_container:
        name: traefik
        image: traefik:latest
        restart_policy: unless-stopped
        published_ports:
          - "80:80"
          - "443:443"
          - "8081:8080"
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"

    # ── Hawser ────────────────────────────────────────────────────────────────
    - name: "Deploy Hawser"
      when: setup_hawser | bool
      community.docker.docker_container:
        name: hawser
        image: ghcr.io/finsys/hawser:latest
        restart_policy: unless-stopped
        published_ports:
          - "2376:2376"
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"

    # ── Portainer Agent ───────────────────────────────────────────────────────
    - name: "Deploy Portainer Agent"
      when: setup_portainer_agent | bool
      community.docker.docker_container:
        name: portainer_agent
        image: portainer/agent:latest
        restart_policy: always
        published_ports:
          - "9001:9001"
        volumes:
          - "/var/run/docker.sock:/var/run/docker.sock"

    # ── Tailscale ─────────────────────────────────────────────────────────────
    - name: "Tailscale: Install and Authenticate"
      when: setup_tailscale | bool
      block:
        - name: "Install Tailscale"
          ansible.builtin.shell: "curl -fsSL https://tailscale.com/install.sh | sh"
          args: { creates: /usr/bin/tailscale }

        - name: "Enable and start tailscaled"
          ansible.builtin.systemd:
            name: tailscaled
            state: started
            enabled: yes

        - name: "Authenticate with Tailscale"
          ansible.builtin.command: "tailscale up --authkey={{ tailscale_auth_key }} --accept-routes"
          changed_when: false

    # ── Komodo Periphery ──────────────────────────────────────────────────────
    - name: "Komodo Periphery: Install and Connect"
      when: setup_komodo | bool
      block:
        - name: "Install Komodo Periphery"
          ansible.builtin.shell: |
            curl -sSL https://raw.githubusercontent.com/moghtech/komodo/main/scripts/setup-periphery.py \
              | sudo python3 - \
              --core-address="{{ komodo_core_address }}" \
              --connect-as="{{ ansible_hostname }}" \
              --onboarding-key="{{ komodo_onboarding_key }}" \
              --version="{{ komodo_version }}"
          args:
            creates: /usr/local/bin/periphery
          changed_when: false
