---
# =======================================================================
# PHASE 1: INFRASTRUCTURE PROVISIONING (PROXMOX API)
# =======================================================================
- name: "Phase 1: Provision Dockhand VM"
  hosts: proxmox
  gather_facts: false
  vars:
    pve_node: "pve"
    template_id: 9000
    vm_name: "dockhand-server"
    ip_subnet_filter: "20\\.0\\.0\\." # Your network range

  tasks:
    - name: "1. API: Get Next Available VMID"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:8006/api2/json/cluster/nextid"
        method: GET
        headers: { Authorization: "PVEAPIToken={{ proxmox_token_id }}={{ proxmox_token_secret }}" }
        validate_certs: false
      register: next_vmid_api
      delegate_to: localhost

    - name: "2. Set Starting VMID Fact"
      ansible.builtin.set_fact:
        start_id: "{{ next_vmid_api.json.data | int }}"

    - name: "3. API: Clone VM"
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "{{ proxmox_token_id.split('!')[0] }}"
        api_token_id: "{{ proxmox_token_id.split('!')[1] }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node: "{{ pve_node }}"
        vmid: "{{ template_id }}"
        clone: "{{ template_id }}"
        newid: "{{ start_id }}"
        name: "{{ vm_name }}"
        full: true
        agent: yes # Enable agent support
        state: present
        timeout: 600
      delegate_to: localhost

    - name: "4. API: Configure Cloud-Init (Credentials & DHCP)"
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "{{ proxmox_token_id.split('!')[0] }}"
        api_token_id: "{{ proxmox_token_id.split('!')[1] }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node: "{{ pve_node }}"
        vmid: "{{ start_id }}"
        update: true
        ciuser: "{{ vm_user }}"
        cipassword: "{{ vm_password }}"
        # FIXED: community.general expects a dictionary for ipconfig
        ipconfig:
          ipconfig0: "ip=dhcp"
      delegate_to: localhost

    - name: "5. API: Start VM"
      community.general.proxmox_kvm:
        api_host: "{{ ansible_host }}"
        api_user: "{{ proxmox_token_id.split('!')[0] }}"
        api_token_id: "{{ proxmox_token_id.split('!')[1] }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node: "{{ pve_node }}"
        vmid: "{{ start_id }}"
        state: started
      delegate_to: localhost

    - name: "6. API: Discover IP Address"
      ansible.builtin.uri:
        url: "https://{{ ansible_host }}:8006/api2/json/nodes/{{ pve_node }}/qemu/{{ start_id }}/agent/network-get-interfaces"
        method: GET
        headers: { Authorization: "PVEAPIToken={{ proxmox_token_id }}={{ proxmox_token_secret }}" }
        validate_certs: false
      register: vm_interfaces_api
      until: "vm_interfaces_api.json.data.result | default([]) | selectattr('name', 'ne', 'lo') | map(attribute='ip-addresses') | flatten | select('search', ip_subnet_filter) | list | length > 0"
      retries: 60
      delay: 5
      delegate_to: localhost

    - name: "7. Inventory Assignment"
      ansible.builtin.add_host:
        name: "provisioned_dockhand_vm"
        ansible_host: "{{ (vm_interfaces_api.json.data.result | selectattr('name', 'ne', 'lo') | map(attribute='ip-addresses') | flatten | select('search', ip_subnet_filter) | first)['ip-address'] }}"
        ansible_user: "{{ vm_user }}"
        ansible_password: "{{ vm_password }}"
        ansible_become_password: "{{ vm_password }}"
        groups: ["dockhand_group"]
        target_vmid: "{{ start_id }}"
      delegate_to: localhost

# =======================================================================
# PHASE 2: CONFIGURATION & SUMMARY
# =======================================================================
- name: "Phase 2: Setup Docker & Firewall"
  hosts: provisioned_dockhand_vm
  gather_facts: true
  become: true
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  tasks:
    - name: "8. Wait for SSH Connectivity"
      ansible.builtin.wait_for_connection:
        timeout: 120

    - name: "9. System Setup (Docker & Security)"
      block:
        - name: Install Packages
          ansible.builtin.apt:
            name: [ufw, curl, wget, iptables]
            state: present
            update_cache: yes

        - name: Install Docker
          ansible.builtin.shell: "curl -fsSL https://get.docker.com | sh"
          args: { creates: /usr/bin/docker }

        - name: Configure User Group
          ansible.builtin.user:
            name: "{{ ansible_user }}"
            groups: docker
            append: yes

        - name: Install ufw-docker
          ansible.builtin.get_url:
            url: https://github.com/chaifeng/ufw-docker/raw/master/ufw-docker
            dest: /usr/local/bin/ufw-docker
            mode: '0755'

        - name: Initialize ufw-docker
          ansible.builtin.command: /usr/local/bin/ufw-docker install
          changed_when: false

    - name: "10. Deploy Dockhand"
      community.docker.docker_container:
        name: dockhand
        image: fnsys/dockhand:latest
        restart_policy: unless-stopped
        state: started
        published_ports: ["8080:3000"]
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
          - /opt/dockhand:/app/data
        env: { HOST_DATA_DIR: "/opt/dockhand" }
      register: dockhand_info

    - name: "11. Apply Firewall Lockdown"
      block:
        - name: Reset & Default Deny
          community.general.ufw: { state: reset }
        
        - name: Set Policies
          community.general.ufw:
            direction: "{{ item.dir }}"
            policy: "{{ item.policy }}"
          loop:
            - { dir: 'incoming', policy: 'deny' }
            - { dir: 'outgoing', policy: 'allow' }
            - { dir: 'routed', policy: 'deny' }

        - name: Allow Admin SSH
          community.general.ufw:
            rule: allow
            from_ip: "{{ ssh_ip }}"
            port: '22'
            proto: tcp

        - name: UFW-Docker Routing Rule
          ansible.builtin.command: >
            ufw route allow proto tcp 
            from {{ ssh_ip }} 
            to {{ dockhand_info.container.NetworkSettings.IPAddress }} port 3000

        - name: Enable UFW
          community.general.ufw: { state: enabled }

    - name: "12. Final Access Summary"
      ansible.builtin.debug:
        msg:
          - "----------------------------------------------------------------"
          - "INFRASTRUCTURE DEPLOYMENT COMPLETE"
          - "----------------------------------------------------------------"
          - "VM ID        : {{ hostvars['provisioned_dockhand_vm']['target_vmid'] }}"
          - "Server IP    : {{ ansible_host }}"
          - "Whitelisted IP: {{ ssh_ip }}"
          - "Dockhand URL : http://{{ ansible_host }}:8080"
          - "----------------------------------------------------------------"
          - "All traffic except SSH and Dockhand from {{ ssh_ip }} is blocked."
          - "----------------------------------------------------------------"
