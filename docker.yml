---
# ┌──────────────────────────────────────────────────────────────────────────┐
# │  Semaphore Variable Group (Extra Variables — JSON):                      │
# │  {                                                                       │
# │    "new_vm_name": "dockhand-node",                                       │
# │    "vm_user":     "astro",                                               │
# │    "vm_password": "root",                                                │
# │    "ssh_ip":      "20.0.0.84"                                            │
# │  }                                                                       │
# └──────────────────────────────────────────────────────────────────────────┘

# ══════════════════════════════════════════════════════════════════════════════
# PLAY 1 — Proxmox: clone, configure, start, bootstrap OS, discover IP
# ══════════════════════════════════════════════════════════════════════════════
- name: "Provision VM from Proxmox template"
  hosts: proxmox
  gather_facts: false
  vars:
    pve_api:      "https://{{ ansible_host }}:8006/api2/json"
    pve_token:    "PVEAPIToken={{ proxmox_token_id }}={{ proxmox_token_secret }}"
    proxmox_node: "pve"
    template_id:  103

  tasks:

    - name: "1. Get next available VMID"
      ansible.builtin.uri:
        url: "{{ pve_api }}/cluster/nextid"
        method: GET
        headers:
          Authorization: "{{ pve_token }}"
        validate_certs: false
      register: next_vmid_api
      delegate_to: localhost

    - name: "2. Set VMID fact"
      ansible.builtin.set_fact:
        resolved_vm_id: "{{ next_vmid_api.json.data | int }}"

    - name: "3. Clone template {{ template_id }} → VMID {{ resolved_vm_id }}"
      community.general.proxmox_kvm:
        api_host:         "{{ ansible_host }}"
        api_user:         "{{ proxmox_token_id.split('!')[0] }}"
        api_token_id:     "{{ proxmox_token_id.split('!')[1] }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node:             "{{ proxmox_node }}"
        vmid:             "{{ template_id }}"
        clone:            "{{ template_id }}"
        newid:            "{{ resolved_vm_id }}"
        name:             "{{ new_vm_name }}-{{ resolved_vm_id }}"
        full:             true
        agent:            1
        state:            present
        timeout:          600
      loop: "{{ range(0, 1) | list }}"
      loop_control:
        pause: 5
      delegate_to: localhost

    - name: "3b. Wait for cloned VM config to be ready"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ resolved_vm_id }}/config"
        method: GET
        headers:
          Authorization: "{{ pve_token }}"
        validate_certs: false
        status_code: 200
      register: vm_config_check
      until: vm_config_check.status == 200
      retries: 20
      delay: 5
      delegate_to: localhost

    - name: "4. Set cloud-init — user / password / DHCP"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ resolved_vm_id }}/config"
        method: PUT
        headers:
          Authorization: "{{ pve_token }}"
        body_format: form-urlencoded
        body:
          ciuser:     "{{ vm_user }}"
          cipassword: "{{ vm_password }}"
          ipconfig0:  "ip=dhcp"
        validate_certs: false
        status_code: 200
      delegate_to: localhost

    - name: "5. Start VM {{ resolved_vm_id }}"
      community.general.proxmox_kvm:
        api_host:         "{{ ansible_host }}"
        api_user:         "{{ proxmox_token_id.split('!')[0] }}"
        api_token_id:     "{{ proxmox_token_id.split('!')[1] }}"
        api_token_secret: "{{ proxmox_token_secret }}"
        node:             "{{ proxmox_node }}"
        vmid:             "{{ resolved_vm_id }}"
        state:            started
      delegate_to: localhost

    - name: "5b. Wait for cloud-init to finish via QEMU agent"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ resolved_vm_id }}/agent/exec"
        method: POST
        headers:
          Authorization: "{{ pve_token }}"
        body_format: json
        body:
          command:
            - "bash"
            - "-c"
            - "cloud-init status | grep -q 'done' && echo OK || exit 1"
        validate_certs: false
        status_code: [200, 500]
      register: ci_wait
      until: ci_wait.status == 200
      retries: 60
      delay: 10
      delegate_to: localhost

    - name: "6. Configure user + enable SSH password auth via QEMU agent"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ resolved_vm_id }}/agent/exec"
        method: POST
        headers:
          Authorization: "{{ pve_token }}"
        body_format: json
        body:
          command:
            - "bash"
            - "-c"
            - |
              id {{ vm_user }} &>/dev/null || useradd -m -s /bin/bash {{ vm_user }}
              echo "{{ vm_user }}:{{ vm_password }}" | chpasswd
              echo '{{ vm_user }} ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/{{ vm_user }}
              chmod 440 /etc/sudoers.d/{{ vm_user }}
              sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
              sed -i 's/^#*KbdInteractiveAuthentication.*/KbdInteractiveAuthentication yes/' /etc/ssh/sshd_config
              systemctl restart ssh || systemctl restart sshd
              reboot
        validate_certs: false
      register: agent_exec
      until: agent_exec.status == 200
      retries: 50
      delay: 5
      delegate_to: localhost

    - name: "7. Wait for reboot to complete"
      ansible.builtin.pause:
        seconds: 60

    - name: "8. Discover VM IP via QEMU guest agent"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ resolved_vm_id }}/agent/network-get-interfaces"
        method: GET
        headers:
          Authorization: "{{ pve_token }}"
        validate_certs: false
      register: vm_interfaces_api
      until: >
        vm_interfaces_api.json.data.result
        | selectattr('name', 'ne', 'lo')
        | map(attribute='ip-addresses')
        | flatten
        | selectattr('ip-address-type', 'eq', 'ipv4')
        | list | length > 0
      retries: 50
      delay: 5
      delegate_to: localhost

    - name: "9. Extract VM IP fact"
      ansible.builtin.set_fact:
        discovered_vm_ip: >-
          {{
            vm_interfaces_api.json.data.result
            | selectattr('name', 'ne', 'lo')
            | map(attribute='ip-addresses')
            | flatten
            | selectattr('ip-address-type', 'eq', 'ipv4')
            | map(attribute='ip-address')
            | first
          }}

    - name: "10. Print discovered IP"
      ansible.builtin.debug:
        msg: "VM {{ resolved_vm_id }} is live at {{ discovered_vm_ip }}"

    - name: "11. Add new VM to in-memory inventory"
      ansible.builtin.add_host:
        name:                   "new_vm"
        ansible_host:           "{{ discovered_vm_ip }}"
        ansible_user:           "{{ vm_user }}"
        ansible_password:       "{{ vm_password }}"
        ansible_become:         true
        ansible_become_method:  sudo
        ansible_become_pass:    "{{ vm_password }}"
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        fwd_ssh_ip:             "{{ ssh_ip }}"
        fwd_vm_user:            "{{ vm_user }}"

# ══════════════════════════════════════════════════════════════════════════════
# PLAY 2 — New VM: wait for SSH, write + run setup script, clean up
# ══════════════════════════════════════════════════════════════════════════════
- name: "Bootstrap new VM"
  hosts: new_vm
  gather_facts: false

  tasks:

    - name: "12. Wait for SSH to become available"
      ansible.builtin.wait_for_connection:
        delay:   10
        timeout: 300

    - name: "13. Gather facts"
      ansible.builtin.setup:

    - name: "14. Write setup script to /tmp/setup.sh"
      ansible.builtin.copy:
        dest:    /tmp/setup.sh
        mode:    "0700"
        content: |
          #!/bin/bash
          set -e

          SSH_IP="{{ fwd_ssh_ip }}"
          ACTUAL_USER="{{ fwd_vm_user }}"

          echo "--- Admin IP  : $SSH_IP ---"
          echo "--- Setup for : $ACTUAL_USER ---"

          # ── 1. Prerequisites ───────────────────────────────────────────────
          dpkg --configure -a || true
          apt-get -f install -y || true
          apt-get update -qq
          apt-get install -y ufw curl wget iptables

          # ── 2. Docker log rotation ─────────────────────────────────────────
          echo "--- Configuring Docker log rotation ---"
          mkdir -p /etc/docker
          cat > /etc/docker/daemon.json <<EOF
          {
            "log-driver": "json-file",
            "log-opts": {
              "max-size": "10m",
              "max-file": "3"
            }
          }
          EOF

          # ── 3. Docker ──────────────────────────────────────────────────────
          echo "--- Installing Docker Engine ---"
          curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
          sh /tmp/get-docker.sh
          rm /tmp/get-docker.sh

          echo "--- Adding $ACTUAL_USER to docker group ---"
          groupadd -f docker || true
          usermod -aG docker "$ACTUAL_USER"

          # ── 4. Enable UFW before ufw-docker ───────────────────────────────
          echo "--- Enabling UFW ---"
          ufw --force reset
          ufw default deny incoming
          ufw default allow outgoing
          ufw default deny routed

          # SSH open temporarily so Ansible can finish
          ufw allow 22/tcp comment 'SSH - temporary open'
          ufw --force enable

          # ── 5. ufw-docker ──────────────────────────────────────────────────
          echo "--- Installing ufw-docker ---"
          wget -qO /usr/local/bin/ufw-docker \
            https://raw.githubusercontent.com/chaifeng/ufw-docker/master/ufw-docker
          chmod +x /usr/local/bin/ufw-docker
          /usr/local/bin/ufw-docker install
          systemctl restart docker

          # ── 6. Deploy Traefik ──────────────────────────────────────────────
          echo "--- Deploying Traefik ---"
          mkdir -p /opt/traefik

          cat > /opt/traefik/traefik.yml <<EOF
          api:
            dashboard: true
            insecure: true
          providers:
            docker:
              exposedByDefault: false
          entryPoints:
            web:
              address: ":80"
            websecure:
              address: ":443"
          log:
            level: INFO
          EOF

          docker rm -f traefik 2>/dev/null || true
          docker run -d \
            --name traefik \
            --restart unless-stopped \
            -p 80:80 \
            -p 443:443 \
            -p 8081:8080 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /opt/traefik/traefik.yml:/etc/traefik/traefik.yml \
            traefik:latest

          # ── 7. Deploy Dockhand ─────────────────────────────────────────────
          echo "--- Deploying Dockhand ---"
          mkdir -p /opt/dockhand
          docker rm -f dockhand 2>/dev/null || true

          docker run -d \
            --name dockhand \
            --restart unless-stopped \
            -p 8080:3000 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /opt/dockhand:/app/data \
            -e HOST_DATA_DIR=/opt/dockhand \
            fnsys/dockhand:latest

          # ── 8. Get container IPs ───────────────────────────────────────────
          {% raw %}
          TRAEFIK_IP=$(docker inspect \
            -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' traefik)
          DOCKHAND_IP=$(docker inspect \
            -f '{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' dockhand)
          {% endraw %}

          if [ -z "$TRAEFIK_IP" ] || [ -z "$DOCKHAND_IP" ]; then
            echo "Error: Could not resolve container IPs."
            docker logs traefik
            docker logs dockhand
            exit 1
          fi

          echo "--- Traefik IP   : $TRAEFIK_IP ---"
          echo "--- Dockhand IP  : $DOCKHAND_IP ---"

          # ── 9. UFW rules for existing containers only ──────────────────────
          echo "--- Configuring UFW container rules ---"

          ufw route allow proto tcp from "$SSH_IP" to "$TRAEFIK_IP" port 80 \
            comment 'Traefik HTTP - admin IP only'
          ufw route allow proto tcp from "$SSH_IP" to "$TRAEFIK_IP" port 443 \
            comment 'Traefik HTTPS - admin IP only'
          ufw route allow proto tcp from "$SSH_IP" to "$TRAEFIK_IP" port 8080 \
            comment 'Traefik dashboard - admin IP only'
          ufw route allow proto tcp from "$SSH_IP" to "$DOCKHAND_IP" port 3000 \
            comment 'Dockhand - admin IP only'

          ufw reload

          # ── Persist admin IP ───────────────────────────────────────────────
          cat > /etc/ufw-admin-ip.conf <<EOF
          # Written by Ansible provision on $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ADMIN_IP=$SSH_IP
          EOF

          # ── Summary ────────────────────────────────────────────────────────
          SERVER_IP=$(hostname -I | awk '{print $1}')
          echo "----------------------------------------------------------------"
          echo "SUCCESS"
          echo "  Admin IP      : $SSH_IP"
          echo "  SSH           : port 22 (temporarily open — locked after)"
          echo "  Traefik HTTP  : http://$SERVER_IP:80       → admin IP only"
          echo "  Traefik HTTPS : https://$SERVER_IP:443     → admin IP only"
          echo "  Traefik UI    : http://$SERVER_IP:8081     → admin IP only"
          echo "  Dockhand      : http://$SERVER_IP:8080     → admin IP only"
          echo "----------------------------------------------------------------"
          ufw status verbose || true
          ufw-docker status || true
      become: false

    - name: "15. Run setup script"
      ansible.builtin.command: /tmp/setup.sh
      become: true
      register: setup_output
      ignore_errors: true

    - name: "15b. Reset SSH connection after UFW enable"
      ansible.builtin.meta: reset_connection

    - name: "16. Remove setup script"
      ansible.builtin.file:
        path:  /tmp/setup.sh
        state: absent
      become: true

    - name: "17. Print setup output"
      ansible.builtin.debug:
        msg: "{{ setup_output.stdout_lines }}"

    - name: "18. Lock SSH to admin IP only"
      ansible.builtin.command: >
        bash -c "
        ufw delete allow 22/tcp;
        ufw allow from {{ fwd_ssh_ip }} to any port 22 proto tcp comment 'SSH - admin IP only';
        ufw reload
        "
      become: true

    - name: "19. Print final confirmation"
      ansible.builtin.debug:
        msg:
          - "Provisioning complete."
          - "SSH restricted to {{ fwd_ssh_ip }} only."
          - "Access Traefik dashboard at http://{{ ansible_host }}:8081"
          - "Access Dockhand at http://{{ ansible_host }}:8080"
