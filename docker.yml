---
# ┌──────────────────────────────────────────────────────────────────────────┐
# │  Semaphore Variable Group (Extra Variables — JSON):                      │
# │  {                                                                       │
# │    "new_vm_name": "dockhand-node",                                       │
# │    "vm_user":     "devops",                                              │
# │    "vm_password": "YourSecurePass!",                                     │
# │    "ssh_ip":      "192.168.1.10"                                         │
# │  }                                                                       │
# └──────────────────────────────────────────────────────────────────────────┘

# ══════════════════════════════════════════════════════════════════════════════
# PLAY 1 — Proxmox: clone, configure, start, bootstrap OS, discover IP
# ══════════════════════════════════════════════════════════════════════════════
- name: "Provision VM from Proxmox template"
  hosts: proxmox
  gather_facts: false
  vars:
    pve_api:      "https://{{ ansible_host }}:8006/api2/json"
    pve_token:    "PVEAPIToken={{ proxmox_token_id }}={{ proxmox_token_secret }}"
    proxmox_node: "pve"

  tasks:

    - name: "1. Get next available VMID"
      ansible.builtin.uri:
        url: "{{ pve_api }}/cluster/nextid"
        method: GET
        headers:
          Authorization: "{{ pve_token }}"
        validate_certs: false
      register: next_vmid_api
      delegate_to: localhost

    - name: "2. Set VMID fact"
      ansible.builtin.set_fact:
        resolved_vm_id: "{{ next_vmid_api.json.data | int }}"

    - name: "3. Clone template 9000 → VMID {{ resolved_vm_id }}"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/9000/clone"
        method: POST
        headers:
          Authorization: "{{ pve_token }}"
        body_format: form-urlencoded
        body:
          newid: "{{ resolved_vm_id }}"
          name:  "{{ new_vm_name }}"
          full:  1
        validate_certs: false
        status_code: 200
      register: clone_job
      delegate_to: localhost

    - name: "4. Poll clone task until complete"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/tasks/{{ clone_job.json.data }}/status"
        method: GET
        headers:
          Authorization: "{{ pve_token }}"
        validate_certs: false
      register: task_poll
      until: task_poll.json.data.status == "stopped"
      retries: 60
      delay: 10
      failed_when:
        - task_poll.json.data.status == "stopped"
        - task_poll.json.data.exitstatus is defined
        - task_poll.json.data.exitstatus != "OK"
      delegate_to: localhost

    - name: "5. Set cloud-init — user / password / DHCP"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ resolved_vm_id }}/config"
        method: PUT
        headers:
          Authorization: "{{ pve_token }}"
        body_format: form-urlencoded
        body:
          ciuser:     "{{ vm_user }}"
          cipassword: "{{ vm_password }}"
          ipconfig0:  "ip=dhcp"
        validate_certs: false
        status_code: 200
      delegate_to: localhost

    - name: "6. Start VM {{ resolved_vm_id }}"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ resolved_vm_id }}/status/start"
        method: POST
        headers:
          Authorization: "{{ pve_token }}"
        validate_certs: false
        status_code: 200
      delegate_to: localhost

    - name: "7. Configure user + enable SSH password auth via QEMU agent"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ resolved_vm_id }}/agent/exec"
        method: POST
        headers:
          Authorization: "{{ pve_token }}"
        body_format: json
        body:
          command:
            - "bash"
            - "-c"
            - |
              # Ensure user exists
              id {{ vm_user }} &>/dev/null || useradd -m -s /bin/bash {{ vm_user }}

              # Set password
              echo "{{ vm_user }}:{{ vm_password }}" | chpasswd

              # Grant passwordless sudo
              echo '{{ vm_user }} ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/{{ vm_user }}
              chmod 440 /etc/sudoers.d/{{ vm_user }}

              # Patch main sshd_config
              sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication yes/' /etc/ssh/sshd_config
              sed -i 's/^#*KbdInteractiveAuthentication.*/KbdInteractiveAuthentication yes/' /etc/ssh/sshd_config

              # Override cloud-init SSH drop-in (takes precedence over main config)
              echo "PasswordAuthentication yes" > /etc/ssh/sshd_config.d/99-ansible.conf
              echo "KbdInteractiveAuthentication yes" >> /etc/ssh/sshd_config.d/99-ansible.conf

              # Ensure user has a valid shell
              usermod -s /bin/bash {{ vm_user }}

              # Remove nologin lockfile left by cloud-init
              rm -f /etc/nologin /run/nologin

              # Restart SSH to apply changes
              systemctl restart ssh || systemctl restart sshd

              # Regenerate machine-id properly
              rm -f /etc/machine-id
              systemd-machine-id-setup

              reboot
        validate_certs: false
      register: agent_exec
      until: agent_exec.status == 200
      retries: 30
      delay: 5
      delegate_to: localhost

    - name: "8. Wait for reboot to complete"
      ansible.builtin.pause:
        seconds: 30

    - name: "9. Discover VM IP via QEMU guest agent"
      ansible.builtin.uri:
        url: "{{ pve_api }}/nodes/{{ proxmox_node }}/qemu/{{ resolved_vm_id }}/agent/network-get-interfaces"
        method: GET
        headers:
          Authorization: "{{ pve_token }}"
        validate_certs: false
      register: vm_interfaces_api
      until: >
        vm_interfaces_api.json.data.result
        | selectattr('name', 'ne', 'lo')
        | map(attribute='ip-addresses')
        | flatten
        | selectattr('ip-address-type', 'eq', 'ipv4')
        | list | length > 0
      retries: 50
      delay: 5
      delegate_to: localhost

    - name: "10. Extract VM IP fact"
      ansible.builtin.set_fact:
        discovered_vm_ip: >-
          {{
            vm_interfaces_api.json.data.result
            | selectattr('name', 'ne', 'lo')
            | map(attribute='ip-addresses')
            | flatten
            | selectattr('ip-address-type', 'eq', 'ipv4')
            | map(attribute='ip-address')
            | first
          }}

    - name: "11. Print discovered IP"
      ansible.builtin.debug:
        msg: "VM {{ resolved_vm_id }} is live at {{ discovered_vm_ip }}"

    - name: "12. Add new VM to in-memory inventory"
      ansible.builtin.add_host:
        name:                   "new_vm"
        ansible_host:           "{{ discovered_vm_ip }}"
        ansible_user:           "{{ vm_user }}"
        ansible_password:       "{{ vm_password }}"
        ansible_become:         true
        ansible_become_method:  sudo
        ansible_become_pass:    "{{ vm_password }}"
        ansible_ssh_extra_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
        fwd_ssh_ip:             "{{ ssh_ip }}"
        fwd_vm_user:            "{{ vm_user }}"

# ══════════════════════════════════════════════════════════════════════════════
# PLAY 2 — New VM: wait for SSH, write + run setup script, clean up
# ══════════════════════════════════════════════════════════════════════════════
- name: "Bootstrap new VM"
  hosts: new_vm
  gather_facts: false

  tasks:

    - name: "13. Wait for SSH to become available"
      ansible.builtin.wait_for_connection:
        delay:   10
        timeout: 300

    - name: "14. Gather facts"
      ansible.builtin.setup:

    - name: "15. Write setup script to /tmp/setup.sh"
      ansible.builtin.copy:
        dest:    /tmp/setup.sh
        mode:    "0700"
        content: |
          #!/bin/bash
          set -e

          # ── Variables injected by Ansible ──────────────────────────────────
          SSH_IP="{{ fwd_ssh_ip }}"
          ACTUAL_USER="{{ fwd_vm_user }}"

          echo "--- Admin IP  : $SSH_IP ---"
          echo "--- Setup for : $ACTUAL_USER ---"

          # ── 1. Prerequisites ───────────────────────────────────────────────
          apt-get update -qq
          apt-get install -y ufw curl wget iptables

          # ── 2. Docker ──────────────────────────────────────────────────────
          echo "--- Installing Docker Engine ---"
          curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
          sh /tmp/get-docker.sh
          rm /tmp/get-docker.sh

          echo "--- Adding $ACTUAL_USER to docker group ---"
          groupadd -f docker || true
          usermod -aG docker "$ACTUAL_USER"

          # ── 3. ufw-docker (BEFORE enabling UFW) ───────────────────────────
          echo "--- Installing ufw-docker ---"
          wget -qO /usr/local/bin/ufw-docker \
            https://github.com/chaifeng/ufw-docker/raw/master/ufw-docker
          chmod +x /usr/local/bin/ufw-docker
          /usr/local/bin/ufw-docker install

          # ── 4. Deploy Dockhand ─────────────────────────────────────────────
          echo "--- Deploying Dockhand ---"
          mkdir -p /opt/dockhand
          docker rm -f dockhand 2>/dev/null || true

          docker run -d \
            --name dockhand \
            --restart unless-stopped \
            -p 8080:3000 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v /opt/dockhand:/app/data \
            -e HOST_DATA_DIR=/opt/dockhand \
            fnsys/dockhand:latest

          CONTAINER_IP=$(docker inspect \
            -f '{{range.NetworkSettings.Networks}}{{.IPAddress}}{{end}}' dockhand)

          if [ -z "$CONTAINER_IP" ]; then
            echo "Error: Could not resolve Dockhand container IP."
            docker logs dockhand
            exit 1
          fi

          echo "--- Dockhand container IP: $CONTAINER_IP ---"

          # ── 5. Configure UFW ───────────────────────────────────────────────
          echo "--- Configuring UFW ---"
          ufw --force reset
          ufw default deny incoming
          ufw default allow outgoing
          ufw default deny routed

          ufw allow from "$SSH_IP" to any port 22 proto tcp \
            comment 'SSH - admin IP only'

          ufw route allow proto tcp \
            from "$SSH_IP" to "$CONTAINER_IP" port 3000 \
            comment 'Dockhand route - admin IP only'

          ufw --force enable
          ufw reload

          # ── Persist admin IP ───────────────────────────────────────────────
          cat > /etc/ufw-admin-ip.conf <<EOF
          # Written by Ansible provision on $(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ADMIN_IP=$SSH_IP
          EOF

          # ── Summary ────────────────────────────────────────────────────────
          SERVER_IP=$(hostname -I | awk '{print $1}')
          echo "----------------------------------------------------------------"
          echo "SUCCESS"
          echo "  Admin IP    : $SSH_IP"
          echo "  SSH         : port 22                → admin IP only"
          echo "  Dockhand    : http://$SERVER_IP:8080  → admin IP only"
          echo "  Container   : $CONTAINER_IP:3000"
          echo "----------------------------------------------------------------"
          ufw status verbose
          ufw-docker status
      become: false

    - name: "16. Run setup script"
      ansible.builtin.command: /tmp/setup.sh
      become: true
      register: setup_output

    - name: "17. Remove setup script"
      ansible.builtin.file:
        path:  /tmp/setup.sh
        state: absent
      become: true

    - name: "18. Print setup output"
      ansible.builtin.debug:
        msg: "{{ setup_output.stdout_lines }}"
